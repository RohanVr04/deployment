<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <title>Diabetes Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(
                135deg,
                #667eea 0%,
                #764ba2 100%
            );
            padding:20px;
        }

        .container{
            width:100%;
            max-width:700px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:25px;
            padding:40px;
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            color:white;
            margin-bottom:10px;
            font-size:2.2rem;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#f1f1f1;
            margin-bottom:30px;
            font-size:0.95rem;
        }

        form{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:18px;
        }

        .input-group{
            display:flex;
            flex-direction:column;
        }

        label{
            color:white;
            font-size:0.9rem;
            margin-bottom:6px;
            font-weight:500;
        }

        input{
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.9);
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            transform:translateY(-2px);
            box-shadow:0 0 15px rgba(255,255,255,0.5);
        }

        .btn-container{
            grid-column:span 2;
            text-align:center;
            margin-top:10px;
        }

        button{
            background:white;
            color:#764ba2;
            border:none;
            padding:14px 40px;
            border-radius:30px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            background:#f8f8f8;
        }

        @media(max-width:600px){

            .container{
                padding:25px;
            }

            form{
                grid-template-columns:1fr;
            }

            .btn-container{
                grid-column:span 1;
            }

            .title{
                font-size:1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1 class="title">🩺 Diabetes Prediction</h1>
        <p class="subtitle">
            Enter the patient's details below to predict diabetes risk.
        </p>

        <form action="/submit" method="post">

            <div class="input-group">
                <label>Pregnancies</label>
                <input type="number" name="preg" placeholder="Enter value">
            </div>

            <div class="input-group">
                <label>Glucose (Plasma)</label>
                <input type="number" name="plas" placeholder="Enter value">
            </div>

            <div class="input-group">
                <label>Blood Pressure</label>
                <input type="number" name="pres" placeholder="Enter value">
            </div>

            <div class="input-group">
                <label>Skin Thickness</label>
                <input type="number" name="skin" placeholder="Enter value">
            </div>

            <div class="input-group">
                <label>Insulin Test</label>
                <input type="number" name="test" placeholder="Enter value">
            </div>

            <div class="input-group">
                <label>BMI (Mass)</label>
                <input type="number" step="0.1" name="mass" placeholder="Enter value">
            </div>

            <div class="input-group">
                <label>Diabetes Pedigree</label>
                <input type="number" step="0.01" name="pedi" placeholder="Enter value">
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="Enter value">
            </div>

            <div class="btn-container">
                <button type="submit">Predict Now</button>
            </div>

        </form>

    </div>

</body>
</html>
