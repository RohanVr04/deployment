<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }


    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#ff4b2b,#ff416c);
    }

    .container{
        background:white;
        padding:40px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        max-width:500px;
    }

    .icon{
        font-size:60px;
        color:#ff4b2b;
    }

    h1{
        color:#d63031;
        margin:20px 0;
    }

    p{
        color:#555;
        line-height:1.6;
        margin-bottom:20px;
    }

    .btn{
        display:inline-block;
        text-decoration:none;
        background:#d63031;
        color:white;
        padding:12px 25px;
        border-radius:8px;
        transition:0.3s;
    }

    .btn:hover{
        background:#b71c1c;
    }
</style>


</head>
<body>


<div class="container">
    <div class="icon">⚠️</div>
    <h1>Diabetes Detected</h1>
    <p>
        Based on the provided health parameters, the model predicts that
        you may be diabetic. Please consult a healthcare professional for
        proper medical advice and diagnosis.
    </p>

    <a href="/" class="btn">Check Again</a>
</div>


</body>
</html>
